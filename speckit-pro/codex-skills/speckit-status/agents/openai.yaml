interface:
  display_name: "SpecKit Status"
  short_description: "Show roadmap, archive, and next recommended spec"
  default_prompt: "Show SpecKit roadmap status, archive extension state, and the next spec to start"

# Read-only dashboard skill — safe for implicit invocation (like speckit-coach).
