# Dependabot configuration for racecraft-plugins-public.
# This repo is a Claude Code plugin marketplace — no application package
# manifests live here. The only thing worth tracking is GitHub Actions
# pinned in `.github/workflows/`.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
